version: 2

project_name: tresor

before:
  hooks:
    - go mod tidy

builds:
  - id: tresor
    main: ./cmd/tresor
    binary: tresor
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.Version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - tresor
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: git

release:
  github:
    owner: willie68
    name: tresor
